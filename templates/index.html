nano index.html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pollos de Engorde</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f7e8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2b5e2b;
            text-align: center;
        }
        .seccion {
            background: #fefef5;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #d0e2c0;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 10px;
            border: 1px solid #aaa;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2b5e2b;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #1e421e;
        }
        .resultado {
            background: #e6f2e6;
            padding: 15px;
            border-radius: 16px;
            margin-top: 25px;
            border-left: 6px solid #2b5e2b;
        }
        .ganancia {
            color: #1f6d1f;
            font-weight: bold;
            font-size: 18px;
        }
        hr {
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐔 Calculadora de Engorde</h1>

    <div class="seccion">
        <h2>💰 COMPRA (COSTOS)</h2>
        <label>Valor unidad de pollo ($):</label>
        <input type="number" id="precio_pollo_unidad" value="7500">

        <label>Cantidad de pollos comprados:</label>
        <input type="number" id="cantidad_pollos_comprados" value="120">

        <label>Cantidad de bultos de comida:</label>
        <input type="number" id="cantidad_bultos" value="11">

        <label>Valor por bulto ($):</label>
        <input type="number" id="valor_bulto" value="80000">
    </div>

    <div class="seccion">
        <h2>📈 VENTA (INGRESOS)</h2>
        <label>Cantidad de pollos a vender:</label>
        <input type="number" id="cantidad_pollos_vender" value="120">

        <label>Peso de cada pollo (libras):</label>
        <input type="number" id="peso_cada_pollo" value="6">

        <label>Valor de compra por libra ($):</label>
        <input type="number" id="precio_venta_libra" value="5500">
    </div>

    <button onclick="calcular()">📊 Calcular todo</button>

    <div id="resultados" class="resultado" style="display:none;">
        <h3>📋 RESULTADOS FINANCIEROS</h3>
        <p><strong>🐤 Costo total de pollos:</strong> $<span id="costo_total_pollos"></span></p>
        <p><strong>🌽 Costo total de comida:</strong> $<span id="costo_total_comida"></span></p>
        <p><strong>💸 Inversión total:</strong> $<span id="inversion_total"></span></p>
        <hr>
        <p><strong>🏷️ Ingreso por venta:</strong> $<span id="ingreso_total"></span></p>
        <p class="ganancia"><strong>✅ Ganancia neta:</strong> $<span id="ganancia_neta"></span></p>
        <p><strong>🐔 Inversión por pollo (comprado):</strong> $<span id="inversion_por_pollo"></span></p>
    </div>
</div>

<script>
    function calcular() {
        const precioPolloUnidad = parseFloat(document.getElementById('precio_pollo_unidad').value);
        const cantidadPollosComprados = parseFloat(document.getElementById('cantidad_pollos_comprados').value);
        const cantidadBultos = parseFloat(document.getElementById('cantidad_bultos').value);
        const valorBulto = parseFloat(document.getElementById('valor_bulto').value);
        const cantidadPollosVender = parseFloat(document.getElementById('cantidad_pollos_vender').value);
        const pesoCadaPollo = parseFloat(document.getElementById('peso_cada_pollo').value);
        const precioVentaLibra = parseFloat(document.getElementById('precio_venta_libra').value);

        if (isNaN(precioPolloUnidad) || isNaN(cantidadPollosComprados) || isNaN(cantidadBultos) || 
            isNaN(valorBulto) || isNaN(cantidadPollosVender) || isNaN(pesoCadaPollo) || isNaN(precioVentaLibra)) {
            alert('Por favor, complete todos los campos con números válidos');
            return;
        }

        const costoTotalPollos = precioPolloUnidad * cantidadPollosComprados;
        const costoTotalComida = cantidadBultos * valorBulto;
        const inversionTotal = costoTotalPollos + costoTotalComida;
        const ingresoTotal = cantidadPollosVender * pesoCadaPollo * precioVentaLibra;
        const gananciaNeta = ingresoTotal - inversionTotal;
        const inversionPorPollo = inversionTotal / cantidadPollosComprados;

        document.getElementById('costo_total_pollos').innerText = costoTotalPollos.toLocaleString('es-CO', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('costo_total_comida').innerText = costoTotalComida.toLocaleString('es-CO', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('inversion_total').innerText = inversionTotal.toLocaleString('es-CO', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('ingreso_total').innerText = ingresoTotal.toLocaleString('es-CO', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('ganancia_neta').innerText = gananciaNeta.toLocaleString('es-CO', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('inversion_por_pollo').innerText = inversionPorPollo.toLocaleString('es-CO', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        document.getElementById('resultados').style.display = 'block';
    }
</script>
</body>
</html>
